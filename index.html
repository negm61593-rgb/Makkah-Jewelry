<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مجوهرات مكة | Makkah Jewelry</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gold: {
                            100: '#F9F1D8',
                            200: '#F0DEAA',
                            300: '#E6CB7D',
                            400: '#DDB850',
                            500: '#D4AF37', // Main Gold
                            600: '#AA8C2C',
                            700: '#806921',
                            800: '#554616',
                            900: '#2B230B',
                        },
                        dark: '#0a0a0a',
                        darker: '#050505'
                    },
                    fontFamily: {
                        sans: ['"Noto Naskh Arabic"', 'serif'],
                        serif: ['"Playfair Display"', 'serif'],
                    },
                    animation: {
                        'fade-in-up': 'fadeInUp 0.8s ease-out forwards',
                        'shimmer': 'shimmer 2s infinite linear',
                        'float': 'float 6s ease-in-out infinite',
                    },
                    keyframes: {
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        shimmer: {
                            '0%': { backgroundPosition: '-1000px 0' },
                            '100%': { backgroundPosition: '1000px 0' },
                        },
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0a0a0a;
        }
        ::-webkit-scrollbar-thumb {
            background: #D4AF37;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #AA8C2C;
        }

        /* Glassmorphism Utilities */
        .glass {
            background: rgba(20, 20, 20, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(212, 175, 55, 0.1);
        }
        
        .glass-card {
            background: linear-gradient(145deg, rgba(30,30,30,0.9) 0%, rgba(10,10,10,0.9) 100%);
            border: 1px solid rgba(212, 175, 55, 0.2);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }

        .text-gold-gradient {
            background: linear-gradient(to right, #D4AF37, #F0DEAA, #D4AF37);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            background-size: 200% auto;
            animation: shine 5s linear infinite;
        }

        @keyframes shine {
            to {
                background-position: 200% center;
            }
        }

        /* Loader */
        .loader {
            border-top-color: #D4AF37;
            -webkit-animation: spinner 1.5s linear infinite;
            animation: spinner 1.5s linear infinite;
        }
        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="bg-darker text-gray-100 font-sans overflow-x-hidden selection:bg-gold-500 selection:text-black">

    <!-- Navigation -->
    <nav class="fixed w-full z-50 glass transition-all duration-300" id="navbar">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-20">
                <!-- Logo -->
                <div class="flex-shrink-0 cursor-pointer" onclick="router.navigate('home')">
                    <h1 class="font-serif text-2xl md:text-3xl font-bold text-gold-gradient tracking-wider">
                        مجوهرات مكة
                    </h1>
                </div>
                
                <!-- Desktop Menu -->
                <div class="hidden md:block">
                    <div class="ml-10 flex items-baseline space-x-8 space-x-reverse">
                        <button onclick="router.navigate('home')" class="hover:text-gold-400 px-3 py-2 rounded-md text-sm font-medium transition-colors">الرئيسية</button>
                        <button onclick="router.navigate('products')" class="hover:text-gold-400 px-3 py-2 rounded-md text-sm font-medium transition-colors">جميع المنتجات</button>
                        <button onclick="router.navigate('contact')" class="hover:text-gold-400 px-3 py-2 rounded-md text-sm font-medium transition-colors">تواصل معنا</button>
                        <!-- Admin Access (Hidden in plain sight) -->
                        <button onclick="adminAuth.prompt()" class="text-gray-600 hover:text-gold-500 text-xs border border-gray-800 px-2 py-1 rounded opacity-50 hover:opacity-100 transition-all">
                            <i class="fas fa-lock"></i> Admin
                        </button>
                    </div>
                </div>

                <!-- Mobile menu button -->
                <div class="md:hidden">
                    <button onclick="toggleMobileMenu()" class="text-gold-400 hover:text-white p-2">
                        <i class="fas fa-bars text-2xl"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- Mobile Menu -->
        <div class="md:hidden hidden glass border-t border-gold-900/30" id="mobile-menu">
            <div class="px-2 pt-2 pb-3 space-y-1 sm:px-3 text-center">
                <button onclick="router.navigate('home'); toggleMobileMenu()" class="text-gray-300 hover:text-gold-400 block px-3 py-2 rounded-md text-base font-medium w-full">الرئيسية</button>
                <button onclick="router.navigate('products'); toggleMobileMenu()" class="text-gray-300 hover:text-gold-400 block px-3 py-2 rounded-md text-base font-medium w-full">المنتجات</button>
                <button onclick="router.navigate('contact'); toggleMobileMenu()" class="text-gray-300 hover:text-gold-400 block px-3 py-2 rounded-md text-base font-medium w-full">تواصل معنا</button>
            </div>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main id="app" class="min-h-screen pt-20 pb-24">
        <!-- Views will be injected here by JS -->
    </main>

    <!-- Floating WhatsApp Button -->
    <a href="https://wa.me/201009635176?text=السلام%20عليكم،%20أريد%20الاستفسار%20عن%20منتجات%20متجر%20مجوهرات%20مكة" 
       target="_blank"
       class="fixed bottom-6 left-6 z-40 bg-green-600 hover:bg-green-500 text-white rounded-full p-4 shadow-lg shadow-green-900/50 transition-transform hover:scale-110 flex items-center gap-2 group">
        <span class="hidden group-hover:inline-block font-bold text-sm">تواصل معنا</span>
        <i class="fab fa-whatsapp text-2xl"></i>

    <!-- Footer -->
    <footer class="bg-black border-t border-gold-900/30 pt-12 pb-8">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-8">
                <div class="text-center md:text-right">
                    <h3 class="text-gold-400 font-serif text-xl mb-4">مجوهرات مكة</h3>
                    <p class="text-gray-400 text-sm">أجود أنواع المجوهرات والذهب بأحدث التصاميم العالمية. ثقة وجودة تدوم لعمر.</p>
                </div>
                <div class="text-center">
                    <h3 class="text-white font-bold mb-4">تواصل معنا</h3>
                    <div class="flex justify-center gap-4">
                        <a href="https://www.facebook.com/share/1FXLCgoZcj/" target="_blank" class="w-10 h-10 rounded-full bg-gray-800 flex items-center justify-center text-blue-400 hover:bg-blue-600 hover:text-white transition-colors">
                            <i class="fab fa-facebook-f"></i>
                        </a>
                        <a href="https://wa.me/201009635176" target="_blank" class="w-10 h-10 rounded-full bg-gray-800 flex items-center justify-center text-green-400 hover:bg-green-600 hover:text-white transition-colors">
                            <i class="fab fa-whatsapp"></i>
                        </a>

                    <h3 class="text-white font-bold mb-4">روابط سريعة</h3>
                    <ul class="space-y-2 text-gray-400 text-sm">
                        <li><button onclick="router.navigate('home')" class="hover:text-gold-400">الرئيسية</button></li>
                        <li><button onclick="router.navigate('products')" class="hover:text-gold-400">المتجر</button></li>

                    </ul>

            <div class="border-t border-gray-800 pt-8 text-center text-gray-600 text-xs">

    <!-- Admin Login Modal -->
    <div id="admin-login-modal" class="fixed inset-0 z-[60] hidden">
        <div class="absolute inset-0 bg-black/80 backdrop-blur-sm" onclick="adminAuth.close()"></div>
        <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-full max-w-md p-6">
            <div class="glass-card p-8 rounded-2xl relative">
                <button onclick="adminAuth.close()" class="absolute top-4 left-4 text-gray-400 hover:text-white">
                    <i class="fas fa-times"></i>
                </button>
                <div class="text-center mb-6">
                    <i class="fas fa-crown text-gold-500 text-4xl mb-2"></i>
                    <h2 class="text-2xl font-serif text-gold-400">لوحة التحكم</h2>
                    <p class="text-gray-400 text-sm mt-2">هذه المنطقة خاصة بالإدارة فقط</p>
                </div>
                <form onsubmit="adminAuth.login(event)" class="space-y-4">
                    <div>
                        <label class="block text-gray-400 text-sm mb-2">كلمة المرور</label>
                        <input type="password" id="admin-pin" class="w-full bg-black/50 border border-gold-900/50 rounded-lg px-4 py-3 text-white focus:border-gold-500 focus:outline-none text-center tracking-widest" placeholder="••••">
                    </div>
                    <button type="submit" class="w-full bg-gold-600 hover:bg-gold-500 text-black font-bold py-3 rounded-lg transition-colors">
                        دخول

                    <p id="login-error" class="text-red-500 text-xs text-center hidden">كلمة المرور غير صحيحة</p>
                </form>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed top-24 left-1/2 transform -translate-x-1/2 bg-gold-500 text-black px-6 py-3 rounded-full shadow-2xl z-[70] transition-all duration-300 opacity-0 translate-y-[-20px] pointer-events-none font-bold flex items-center gap-2">
        <i class="fas fa-check-circle"></i>
        <span id="toast-msg">تمت العملية بنجاح</span>
    </div>

    <script>
        // --- Data Management (Simulating Backend) ---
        const db = {
            key: 'makkah_jewelry_data',
            get: function() {
                const data = localStorage.getItem(this.key);
                if (data) return JSON.parse(data);
                // Default Initial Data
                return {
                    products: [
                        {
                            id: 1,
                            name: "خاتم ذهب عيار 18 عيار",
                            price: 8500,
                            category: "خواتم",
                            description: "خاتم فاخر مطلي بالذهب عيار 18، مناسب للمناسبات الخاصة. تصميم كلاسيكي أنيق.",
                            images: ["https://images.unsplash.com/photo-1605100804763-247f67b3557e?auto=format&fit=crop&w=800&q=80"],
                            featured: true,
                            offer: false
                        },
                        {
                            id: 2,
                            name: "طقم مجوهرات كامل",
                            price: 12500,
                            category: "أطقم مجوهرات",
                            description: "طقم متكامل يتضمن عقد، أقراط، وسوار. تصميم ملكي فاخر.",
                            images: ["https://images.unsplash.com/photo-1515562141207-7a88fb7ce338?auto=format&fit=crop&w=800&q=80"],
                            featured: true,
                            offer: true
                        },
                        {
                            id: 3,
                            name: "سوار ذهبي أنيق",
                            price: 4500,
                            category: "أساور",
                            description: "سوار ذهبي ناعم بتصميم عصري يناسب الإطلالات اليومية.",
                            images: ["https://images.unsplash.com/photo-1611591437281-460bfbe1220a?auto=format&fit=crop&w=800&q=80"],
                            featured: false,
                            offer: false
                        },
                        {
                            id: 4,
                            name: "سلسلة ذهب إيطالي",
                            price: 9200,
                            category: "سلاسل",
                            description: "سلسلة ذهبية نقية بتصميم إيطالي رفيع ولامع.",
                            images: ["https://images.unsplash.com/photo-1599643478518-17488fbbcd75?auto=format&fit=crop&w=800&q=80"],
                            featured: true,
                            offer: false
                        }
                    ]
                };
            },
            save: function(data) {
                localStorage.setItem(this.key, JSON.stringify(data));
            },
            getProducts: function() {
                return this.get().products;
            },
            getProduct: function(id) {
                return this.get().products.find(p => p.id == id);
            },
            addProduct: function(product) {
                const data = this.get();
                product.id = Date.now();
                data.products.push(product);
                this.save(data);
                return product;
            },
            updateProduct: function(id, updatedData) {
                const data = this.get();
                const index = data.products.findIndex(p => p.id == id);
                if (index !== -1) {
                    data.products[index] = { ...data.products[index], ...updatedData };
                    this.save(data);
                    return true;
                }
                return false;
            },
            deleteProduct: function(id) {
                const data = this.get();
                data.products = data.products.filter(p => p.id != id);
                this.save(data);
            }
        };

        // --- Router & Views ---
        const router = {
            currentPage: 'home',
            navigate: function(page, params = null) {
                this.currentPage = page;
                window.scrollTo(0, 0);
                const app = document.getElementById('app');
                
                // Simple fade out effect could go here
                
                switch(page) {
                    case 'home':
                        app.innerHTML = views.home();
                        break;
                    case 'products':
                        app.innerHTML = views.products(params);
                        break;
                    case 'product-details':
                        app.innerHTML = views.productDetails(params);
                        break;
                    case 'contact':
                        app.innerHTML = views.contact();
                        break;
                    case 'admin':
                        if(adminAuth.isAuthenticated) {
                            app.innerHTML = views.admin();
                            adminDashboard.init();
                        } else {
                            adminAuth.prompt();
                            this.navigate('home');
                        }
                        break;
                    default:
                        app.innerHTML = views.home();
                }
            }
        };

        // --- View Templates ---
        const views = {
            home: () => {
                const products = db.getProducts();
                const featured = products.filter(p => p.featured).slice(0, 4);
                const latest = [...products].reverse().slice(0, 4);

                return `
                    <!-- Hero Section -->
                    <div class="relative h-[80vh] flex items-center justify-center overflow-hidden">
                        <div class="absolute inset-0 z-0">
                            <img src="https://images.unsplash.com/photo-1573408301185-9146fe634ad0?auto=format&fit=crop&w=1920&q=80" class="w-full h-full object-cover opacity-40" alt="Luxury Jewelry">
                            <div class="absolute inset-0 bg-gradient-to-b from-darker/50 via-darker/20 to-darker"></div>
                        </div>
                        <div class="relative z-10 text-center px-4 max-w-4xl mx-auto animate-fade-in-up">
                            <h2 class="text-gold-400 text-lg md:text-xl tracking-[0.3em] mb-4 font-bold">فخامة لا تُضاهى</h2>
                            <h1 class="text-5xl md:text-7xl font-serif font-bold text-white mb-6 leading-tight">
                                مجوهرات مكة
                            </h1>
                            <p class="text-gray-300 text-lg md:text-xl mb-10 max-w-2xl mx-auto leading-relaxed">
                                اكتشف تشكيلتنا الفاخرة من الذهب والألماس. جودة عالية، تصاميم عصرية، وإتقان في الصناعة.
                            </p>
                            <button onclick="router.navigate('products')" class="bg-gold-600 hover:bg-gold-500 text-black font-bold py-4 px-10 rounded-full transition-all transform hover:scale-105 shadow-[0_0_20px_rgba(212,175,55,0.4)]">
                                تصفح المنتجات
                            </button>
                        </div>
                    </div>

                    <!-- Featured Section -->
                    <section class="py-20 px-4 max-w-7xl mx-auto">
                        <div class="text-center mb-16">
                            <h3 class="text-3xl font-serif text-gold-400 mb-2">منتجات مميزة</h3>
                            <div class="h-1 w-24 bg-gold-600 mx-auto rounded-full"></div>
                        </div>
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
                            ${featured.map(p => components.productCard(p)).join('')}
                        </div>
                    </section>

                    <!-- Offers Banner -->
                    <section class="py-20 bg-gradient-to-r from-gold-900/20 to-black border-y border-gold-900/30">
                        <div class="max-w-7xl mx-auto px-4 flex flex-col md:flex-row items-center justify-between gap-10">
                            <div class="md:w-1/2 text-right">
                                <span class="text-gold-500 font-bold tracking-wider">عروض خاصة</span>
                                <h2 class="text-4xl font-serif text-white mt-2 mb-4">خصومات تصل إلى 20% على الأطقم</h2>
                                <p class="text-gray-400 mb-8">لفترة محدودة، احصل على خصم حصري عند الطلب عبر الواتساب. لا تفوت الفرصة!</p>
                                <button onclick="router.navigate('products')" class="border-2 border-gold-500 text-gold-500 hover:bg-gold-500 hover:text-black font-bold py-3 px-8 rounded-lg transition-colors">
                                    اكتشف العروض
                                </button>
                            </div>
                            <div class="md:w-1/2 relative">
                                <div class="absolute inset-0 bg-gold-500 blur-[100px] opacity-20"></div>
                                <img src="https://images.unsplash.com/photo-1535632066927-ab7c9ab60908?auto=format&fit=crop&w=800&q=80" class="relative rounded-lg shadow-2xl border border-gold-900/50 rotate-3 hover:rotate-0 transition-transform duration-500" alt="Offer">
                            </div>
                        </div>
                    </section>

                    <!-- Latest Products -->
                    <section class="py-20 px-4 max-w-7xl mx-auto">
                        <div class="flex justify-between items-end mb-10 border-b border-gray-800 pb-4">
                            <div>
                                <h3 class="text-2xl font-serif text-white">وصل حديثاً</h3>
                                <p class="text-gray-500 text-sm mt-1">أحدث القطع التي أضفناها إلى المتجر</p>
                            </div>
                            <button onclick="router.navigate('products')" class="text-gold-500 hover:text-gold-300 text-sm font-bold">عرض الكل <i class="fas fa-arrow-left mr-1"></i></button>
                        </div>
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
                            ${latest.map(p => components.productCard(p)).join('')}
                        </div>
                    </section>
                `;
            },

            products: (filter = {}) => {
                let products = db.getProducts();
                
                // Search Filter
                if(filter.search) {
                    const term = filter.search.toLowerCase();
                    products = products.filter(p => p.name.toLowerCase().includes(term) || p.description.toLowerCase().includes(term));
                }
                
                // Category Filter
                if(filter.category && filter.category !== 'all') {
                    products = products.filter(p => p.category === filter.category);
                }

                // Price Sort
                if(filter.sort === 'low') products.sort((a,b) => a.price - b.price);
                if(filter.sort === 'high') products.sort((a,b) => b.price - a.price);

                return `
                    <div class="max-w-7xl mx-auto px-4 py-10 animate-fade-in-up">
                        <div class="text-center mb-12">
                            <h2 class="text-4xl font-serif text-gold-400 mb-4">جميع المنتجات</h2>
                            <p class="text-gray-400">تصفح مجموعتنا الفاخرة واطلب مباشرة عبر الواتساب</p>
                        </div>

                        <!-- Filters -->
                        <div class="bg-dark p-6 rounded-xl border border-gray-800 mb-10 shadow-lg">
                            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                                <div class="relative">
                                    <i class="fas fa-search absolute right-3 top-3.5 text-gray-500"></i>
                                    <input type="text" id="search-input" placeholder="ابحث عن منتج..." 
                                        class="w-full bg-black border border-gray-700 rounded-lg py-3 pr-10 text-white focus:border-gold-500 focus:outline-none"
                                        oninput="views.handleSearch(this.value)">
                                </div>
                                <select onchange="views.handleCategory(this.value)" class="bg-black border border-gray-700 rounded-lg py-3 px-4 text-white focus:border-gold-500 focus:outline-none">
                                    <option value="all">جميع الفئات</option>
                                    <option value="خواتم">خواتم</option>
                                    <option value="سلاسل">سلاسل</option>
                                    <option value="أساور">أساور</option>
                                    <option value="أطقم مجوهرات">أطقم مجوهرات</option>
                                </select>
                                <select onchange="views.handleSort(this.value)" class="bg-black border border-gray-700 rounded-lg py-3 px-4 text-white focus:border-gold-500 focus:outline-none">
                                    <option value="newest">الأحدث</option>
                                    <option value="low">السعر: من الأقل للأعلى</option>
                                    <option value="high">السعر: من الأعلى للأقل</option>
                                </select>
                                <div class="flex items-center text-gray-400 text-sm">
                                    <span>عدد النتائج: ${products.length}</span>
                                </div>
                            </div>
                        </div>

                        <!-- Grid -->
                        ${products.length > 0 ? `
                            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
                                ${products.map(p => components.productCard(p)).join('')}
                            </div>
                        ` : `
                            <div class="text-center py-20">
                                <i class="fas fa-box-open text-6xl text-gray-700 mb-4"></i>
                                <p class="text-gray-400 text-xl">لا توجد منتجات مطابقة لبحثك</p>
                            </div>
                        `}
                    </div>
                `;
            },

            productDetails: (id) => {
                const product = db.getProduct(id);
                if(!product) return `<div class="text-center py-20">المنتج غير موجود</div>`;

                const whatsappMsg = `السلام عليكم، أريد طلب هذا المنتج من متجر مجوهرات مكة: %0A%0Aاسم المنتج: ${product.name}%0Aالسعر: ${product.price} جنيه%0A%0Aمن فضلك تواصل معي لإتمام الطلب.`;
                const whatsappLink = `https://wa.me/201009635176?text=${whatsappMsg}`;

                return `
                    <div class="max-w-7xl mx-auto px-4 py-10 animate-fade-in-up">
                        <button onclick="router.navigate('products')" class="mb-6 text-gray-400 hover:text-gold-500 flex items-center gap-2">
                            <i class="fas fa-arrow-right"></i> رجوع للمنتجات
                        </button>
                        
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-12 bg-dark p-6 md:p-10 rounded-2xl border border-gray-800 shadow-2xl">
                            <!-- Image -->
                            <div class="relative group">
                                <div class="aspect-w-1 aspect-h-1 w-full overflow-hidden rounded-xl bg-gray-800">
                                    <img src="${product.images[0]}" alt="${product.name}" class="w-full h-[400px] object-cover object-center group-hover:scale-110 transition-transform duration-700">
                                </div>
                                ${product.offer ? `<span class="absolute top-4 right-4 bg-red-600 text-white text-xs font-bold px-3 py-1 rounded-full">عرض خاص</span>` : ''}
                            </div>

                            <!-- Info -->
                            <div class="flex flex-col justify-center text-right">
                                <div class="mb-2 text-gold-500 text-sm font-bold tracking-wider">${product.category}</div>
                                <h1 class="text-3xl md:text-4xl font-serif text-white mb-4">${product.name}</h1>
                                <div class="text-3xl text-gold-400 font-bold mb-6">${product.price} ج.م</div>
                                
                                <div class="prose prose-invert mb-8 text-gray-300 leading-relaxed">
                                    <p>${product.description}</p>
                                </div>

                                <div class="flex flex-col gap-4">
                                    <a href="${whatsappLink}" target="_blank" class="w-full bg-green-600 hover:bg-green-500 text-white font-bold py-4 rounded-xl flex items-center justify-center gap-3 transition-transform hover:scale-[1.02] shadow-lg">
                                        <i class="fab fa-whatsapp text-xl"></i>
                                        اطلب عبر واتساب
                                    </a>
                                    <button onclick="utils.shareProduct('${product.name}')" class="w-full bg-gray-800 hover:bg-gray-700 text-white font-bold py-4 rounded-xl flex items-center justify-center gap-3 transition-colors">
                                        <i class="fas fa-share-alt"></i>
                                        مشاركة المنتج
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            },

            contact: () => `
                <div class="max-w-4xl mx-auto px-4 py-20 animate-fade-in-up text-center">
                    <h2 class="text-4xl font-serif text-gold-400 mb-8">تواصل معنا</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <a href="https://wa.me/201009635176" target="_blank" class="glass-card p-8 rounded-2xl hover:border-green-500 transition-colors group">
                            <i class="fab fa-whatsapp text-5xl text-green-500 mb-4 group-hover:scale-110 transition-transform block"></i>
                            <h3 class="text-xl font-bold text-white mb-2">واتساب</h3>
                            <p class="text-gray-400">+20 100 963 5176</p>
                            <p class="text-sm text-gold-500 mt-4">تواصل مباشرة للطلب</p>
                        </a>
                        <a href="https://www.facebook.com/share/1FXLCgoZcj/" target="_blank" class="glass-card p-8 rounded-2xl hover:border-blue-500 transition-colors group">
                            <i class="fab fa-facebook text-5xl text-blue-500 mb-4 group-hover:scale-110 transition-transform block"></i>
                            <h3 class="text-xl font-bold text-white mb-2">فيسبوك</h3>
                            <p class="text-gray-400">Makkah Jewelry</p>
                            <p class="text-sm text-gold-500 mt-4">تابعنا للعروض</p>
                        </a>
                    </div>
                    <div class="mt-16 p-8 glass-card rounded-2xl">
                        <h3 class="text-2xl text-white mb-4">ساعات العمل</h3>
                        <div class="flex justify-center gap-8 text-gray-300">
                            <div>السبت - الخميس: 10 صباحاً - 10 مساءً</div>
                            <div>الجمعة: 2 مساءً - 10 مساءً</div>
                        </div>
                    </div>
                </div>
            `,

            admin: () => `
                <div class="max-w-7xl mx-auto px-4 py-10 animate-fade-in-up">
                    <div class="flex justify-between items-center mb-10 border-b border-gray-800 pb-4">
                        <div>
                            <h2 class="text-3xl font-serif text-gold-400">لوحة التحكم</h2>
                            <p class="text-gray-500 text-sm">إدارة المنتجات والطلبات</p>
                        </div>
                        <div class="flex gap-3">
                            <button onclick="adminDashboard.openModal()" class="bg-gold-600 hover:bg-gold-500 text-black font-bold py-2 px-6 rounded-lg flex items-center gap-2">
                                <i class="fas fa-plus"></i> إضافة منتج
                            </button>
                            <button onclick="adminAuth.logout()" class="bg-red-900/50 hover:bg-red-900 text-red-200 py-2 px-4 rounded-lg text-sm">
                                <i class="fas fa-sign-out-alt"></i> خروج
                            </button>
                        </div>
                    </div>

                    <!-- Stats -->
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
                        <div class="glass-card p-6 rounded-xl">
                            <div class="text-gray-400 text-sm mb-1">إجمالي المنتجات</div>
                            <div class="text-3xl font-bold text-white" id="admin-count-all">0</div>
                        </div>
                        <div class="glass-card p-6 rounded-xl border-l-4 border-gold-500">
                            <div class="text-gray-400 text-sm mb-1">المنتجات المميزة</div>
                            <div class="text-3xl font-bold text-gold-400" id="admin-count-featured">0</div>
                        </div>
                        <div class="glass-card p-6 rounded-xl border-l-4 border-red-500">
                            <div class="text-gray-400 text-sm mb-1">العروض الخاصة</div>
                            <div class="text-3xl font-bold text-red-400" id="admin-count-offers">0</div>
                        </div>
                    </div>

                    <!-- Product List -->
                    <div class="bg-dark rounded-xl border border-gray-800 overflow-hidden">
                        <table class="w-full text-right">
                            <thead class="bg-black/50 text-gray-400 text-sm">
                                <tr>
                                    <th class="p-4 font-medium">الصورة</th>
                                    <th class="p-4 font-medium">الاسم</th>
                                    <th class="p-4 font-medium">السعر</th>
                                    <th class="p-4 font-medium">الفئة</th>
                                    <th class="p-4 font-medium">الحالة</th>
                                    <th class="p-4 font-medium text-left">إجراءات</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-800" id="admin-product-list">
                                <!-- Populated by JS -->
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Add/Edit Modal -->
                <div id="product-modal" class="fixed inset-0 z-[60] hidden overflow-y-auto">
                    <div class="absolute inset-0 bg-black/80 backdrop-blur-sm" onclick="adminDashboard.closeModal()"></div>
                    <div class="relative min-h-screen md:min-h-0 md:absolute md:top-10 md:left-1/2 md:transform md:-translate-x-1/2 w-full md:max-w-2xl p-4">
                        <div class="glass-card rounded-2xl p-6 md:p-8 relative">
                            <button onclick="adminDashboard.closeModal()" class="absolute top-4 left-4 text-gray-400 hover:text-white">
                                <i class="fas fa-times text-xl"></i>
                            </button>
                            <h3 class="text-2xl font-serif text-gold-400 mb-6" id="modal-title">إضافة منتج جديد</h3>
                            
                            <form id="product-form" onsubmit="adminDashboard.saveProduct(event)" class="space-y-4">
                                <input type="hidden" id="p-id">
                                
                                <div>
                                    <label class="block text-gray-400 text-sm mb-1">اسم المنتج</label>
                                    <input type="text" id="p-name" required class="w-full bg-black/50 border border-gray-700 rounded-lg px-4 py-2 text-white focus:border-gold-500 focus:outline-none">
                                </div>

                                <div class="grid grid-cols-2 gap-4">
                                    <div>
                                        <label class="block text-gray-400 text-sm mb-1">السعر (جنيه)</label>
                                        <input type="number" id="p-price" required class="w-full bg-black/50 border border-gray-700 rounded-lg px-4 py-2 text-white focus:border-gold-500 focus:outline-none">
                                    </div>
                                    <div>
                                        <label class="block text-gray-400 text-sm mb-1">الفئة</label>
                                        <select id="p-category" class="w-full bg-black/50 border border-gray-700 rounded-lg px-4 py-2 text-white focus:border-gold-500 focus:outline-none">
                                            <option value="خواتم">خواتم</option>
                                            <option value="سلاسل">سلاسل</option>
                                            <option value="أساور">أساور</option>
                                            <option value="أطقم مجوهرات">أطقم مجوهرات</option>
                                        </select>
                                    </div>
                                </div>

                                <div>
                                    <label class="block text-gray-400 text-sm mb-1">رابط الصورة</label>
                                    <input type="url" id="p-image" required placeholder="https://..." class="w-full bg-black/50 border border-gray-700 rounded-lg px-4 py-2 text-white focus:border-gold-500 focus:outline-none">
                                    <p class="text-xs text-gray-500 mt-1">استخدم رابط مباشر للصورة (مثال: unsplash)</p>
                                </div>

                                <div>
                                    <label class="block text-gray-400 text-sm mb-1">الوصف</label>
                                    <textarea id="p-desc" rows="3" class="w-full bg-black/50 border border-gray-700 rounded-lg px-4 py-2 text-white focus:border-gold-500 focus:outline-none"></textarea>
                                </div>

                                <div class="flex gap-4 pt-2">
                                    <label class="flex items-center gap-2 cursor-pointer">
                                        <input type="checkbox" id="p-featured" class="w-5 h-5 rounded border-gray-700 text-gold-600 focus:ring-gold-500 bg-black/50">
                                        <span class="text-gray-300">منتج مميز</span>
                                    </label>
                                    <label class="flex items-center gap-2 cursor-pointer">
                                        <input type="checkbox" id="p-offer" class="w-5 h-5 rounded border-gray-700 text-red-600 focus:ring-red-500 bg-black/50">
                                        <span class="text-gray-300">عرض خاص</span>
                                    </label>
                                </div>

                                <button type="submit" class="w-full bg-gold-600 hover:bg-gold-500 text-black font-bold py-3 rounded-lg mt-4 transition-colors">
                                    حفظ المنتج
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            `,

            // Filter Handlers
            handleSearch: (val) => router.navigate('products', { search: val, category: document.querySelector('select').value }),
            handleCategory: (val) => router.navigate('products', { category: val }),
            handleSort: (val) => router.navigate('products', { sort: val })
        };

        // --- Components ---
        const components = {
            productCard: (p) => {
                const whatsappMsg = `السلام عليكم، أريد طلب هذا المنتج من متجر مجوهرات مكة: %0A%0Aاسم المنتج: ${p.name}%0Aالسعر: ${p.price} جنيه%0A%0Aمن فضلك تواصل معي لإتمام الطلب.`;
                const whatsappLink = `https://wa.me/201009635176?text=${whatsappMsg}`;

                return `
                    <div class="glass-card rounded-xl overflow-hidden group hover:-translate-y-2 transition-transform duration-300 flex flex-col h-full">
                        <div class="relative h-64 overflow-hidden cursor-pointer" onclick="router.navigate('product-details', ${p.id})">
                            <img src="${p.images[0]}" alt="${p.name}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">
                            ${p.offer ? `<div class="absolute top-0 left-0 bg-red-600 text-white text-xs font-bold px-3 py-1 rounded-br-lg">عرض</div>` : ''}
                            ${p.featured ? `<div class="absolute top-0 right-0 bg-gold-600 text-black text-xs font-bold px-3 py-1 rounded-bl-lg">مميز</div>` : ''}
                            
                            <!-- Overlay Actions -->
                            <div class="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-center justify-center gap-3">
                                <button onclick="event.stopPropagation(); router.navigate('product-details', ${p.id})" class="bg-white text-black w-10 h-10 rounded-full flex items-center justify-center hover:bg-gold-500 transition-colors" title="عرض التفاصيل">
                                    <i class="fas fa-eye"></i>
                                </button>
                                <button onclick="event.stopPropagation(); utils.shareProduct('${p.name}')" class="bg-white text-black w-10 h-10 rounded-full flex items-center justify-center hover:bg-gold-500 transition-colors" title="مشاركة">
                                    <i class="fas fa-share-alt"></i>
                                </button>
                            </div>
                        </div>
                        <div class="p-5 flex flex-col flex-grow text-right">
                            <div class="text-xs text-gold-500 mb-1">${p.category}</div>
                            <h3 class="text-lg font-bold text-white mb-2 leading-snug cursor-pointer hover:text-gold-400" onclick="router.navigate('product-details', ${p.id})">${p.name}</h3>
                            <p class="text-gray-400 text-sm mb-4 line-clamp-2 flex-grow">${p.description}</p>
                            <div class="flex items-center justify-between mt-auto pt-4 border-t border-gray-700">
                                <span class="text-xl font-bold text-gold-400">${p.price} ج.م</span>
                                <a href="${whatsappLink}" target="_blank" class="bg-green-600 hover:bg-green-500 text-white text-sm font-bold py-2 px-4 rounded-lg flex items-center gap-2 transition-colors">
                                    <i class="fab fa-whatsapp"></i> اطلب
                                </a>
                            </div>
                        </div>
                    </div>
                `;
            }
        };

        // --- Admin Logic ---
        const adminAuth = {
            isAuthenticated: false,
            pin: '1234', // Simple PIN for demo
            
            prompt: function() {
                document.getElementById('admin-login-modal').classList.remove('hidden');
                document.getElementById('admin-pin').value = '';
                document.getElementById('admin-pin').focus();
            },
            
            close: function() {
                document.getElementById('admin-login-modal').classList.add('hidden');
                document.getElementById('login-error').classList.add('hidden');
            },
            
            login: function(e) {
                e.preventDefault();
                const input = document.getElementById('admin-pin').value;
                if(input === this.pin) {
                    this.isAuthenticated = true;
                    this.close();
                    router.navigate('admin');
                    utils.showToast('تم الدخول للوحة التحكم');
                } else {
                    document.getElementById('login-error').classList.remove('hidden');
                }
            },
            
            logout: function() {
                this.isAuthenticated = false;
                router.navigate('home');
                utils.showToast('تم تسجيل الخروج');
            }
        };

        const adminDashboard = {
            init: function() {
                this.renderTable();
                this.updateStats();
            },

            renderTable: function() {
                const products = db.getProducts();
                const tbody = document.getElementById('admin-product-list');
                tbody.innerHTML = products.map(p => `
                    <tr class="hover:bg-white/5 transition-colors group">
                        <td class="p-4"><img src="${p.images[0]}" class="w-12 h-12 rounded object-cover border border-gray-700"></td>
                        <td class="p-4 font-medium text-white">${p.name}</td>
                        <td class="p-4 text-gold-400">${p.price}</td>
                        <td class="p-4 text-gray-400 text-sm">${p.category}</td>
                        <td class="p-4">
                            ${p.featured ? '<span class="bg-gold-900/50 text-gold-400 text-xs px-2 py-1 rounded border border-gold-900">مميز</span>' : ''}
                            ${p.offer ? '<span class="bg-red-900/50 text-red-400 text-xs px-2 py-1 rounded border border-red-900 mr-1">عرض</span>' : ''}
                        </td>
                        <td class="p-4 text-left">
                            <button onclick="adminDashboard.editProduct(${p.id})" class="text-blue-400 hover:text-blue-300 mx-1" title="تعديل"><i class="fas fa-edit"></i></button>
                            <button onclick="adminDashboard.deleteProduct(${p.id})" class="text-red-400 hover:text-red-300 mx-1" title="حذف"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>
                `).join('');
            },

            updateStats: function() {
                const products = db.getProducts();
                document.getElementById('admin-count-all').innerText = products.length;
                document.getElementById('admin-count-featured').innerText = products.filter(p => p.featured).length;
                document.getElementById('admin-count-offers').innerText = products.filter(p => p.offer).length;
            },

            openModal: function(id = null) {
                document.getElementById('product-modal').classList.remove('hidden');
                document.getElementById('product-form').reset();
                document.getElementById('p-id').value = '';
                document.getElementById('modal-title').innerText = 'إضافة منتج جديد';
                
                if(id) {
                    const p = db.getProduct(id);
                    document.getElementById('p-id').value = p.id;
                    document.getElementById('p-name').value = p.name;
                    document.getElementById('p-price').value = p.price;
                    document.getElementById('p-category').value = p.category;
                    document.getElementById('p-image').value = p.images[0];
                    document.getElementById('p-desc').value = p.description;
                    document.getElementById('p-featured').checked = p.featured;
                    document.getElementById('p-offer').checked = p.offer;
                    document.getElementById('modal-title').innerText = 'تعديل منتج';
                }
            },

            closeModal: function() {
                document.getElementById('product-modal').classList.add('hidden');
            },

            saveProduct: function(e) {
                e.preventDefault();
                const id = document.getElementById('p-id').value;
                const data = {
                    name: document.getElementById('p-name').value,
                    price: parseFloat(document.getElementById('p-price').value),
                    category: document.getElementById('p-category').value,
                    images: [document.getElementById('p-image').value],
                    description: document.getElementById('p-desc').value,
                    featured: document.getElementById('p-featured').checked,
                    offer: document.getElementById('p-offer').checked
                };

                if(id) {
                    db.updateProduct(id, data);
                    utils.showToast('تم تحديث المنتج بنجاح');
                } else {
                    db.addProduct(data);
                    utils.showToast('تم إضافة المنتج بنجاح');
                }
                
                this.closeModal();
                this.renderTable();
                this.updateStats();
            },

            editProduct: function(id) {
                this.openModal(id);
            },

            deleteProduct: function(id) {
                if(confirm('هل أنت متأكد من حذف هذا المنتج؟')) {
                    db.deleteProduct(id);
                    this.renderTable();
                    this.updateStats();
                    utils.showToast('تم حذف المنتج');
                }
            }
        };

        // --- Utilities ---
        const utils = {
            showToast: function(msg) {
                const toast = document.getElementById('toast');
                document.getElementById('toast-msg').innerText = msg;
                toast.classList.remove('opacity-0', 'translate-y-[-20px]');
                setTimeout(() => {
                    toast.classList.add('opacity-0', 'translate-y-[-20px]');
                }, 3000);
            },

            shareProduct: function(name) {
                // In a real PWA, use Web Share API. Here we simulate or copy link.
                if (navigator.share) {
                    navigator.share({
                        title: name,
                        text: `شاهد هذا المنتج من مجوهرات مكة: ${name}`,
                        url: window.location.href
                    }).catch(console.error);
                } else {
                    // Fallback
                    utils.showToast('تم نسخ رابط المنتج');
                }
            }
        };

        // --- Mobile Menu Toggle ---
        function toggleMobileMenu() {
            const menu = document.getElementById('mobile-menu');
            menu.classList.toggle('hidden');
        }

        // --- Initialization ---
        document.addEventListener('DOMContentLoaded', () => {
            router.navigate('home');
            
            // Navbar scroll effect
            window.addEventListener('scroll', () => {
                const nav = document.getElementById('navbar');
                if(window.scrollY > 50) {
                    nav.classList.add('shadow-lg');
                    nav.style.background = 'rgba(10, 10, 10, 0.95)';
                } else {
                    nav.classList.remove('shadow-lg');
                    nav.style.background = 'rgba(20, 20, 20, 0.7)';
                }
            });
        });

    </script>
</body>
</html>
